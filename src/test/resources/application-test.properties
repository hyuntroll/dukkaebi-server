spring.datasource.url=jdbc:h2:mem:dukkaebi-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.database=H2
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379

jwt.secretKey=test-secret-key
jwt.refreshExp=604800000
jwt.accessExp=6000000

server.domain=http://localhost:8080

storage.provider=local
storage.local.root-path=./build/test-uploads
storage.local.public-base-path=/files

cloud.aws.s3.bucket=test-bucket
cloud.aws.stack.auto=false
cloud.aws.region.static=ap-northeast-2
cloud.aws.credentials.access-key=test-access-key
cloud.aws.credentials.secret-key=test-secret-key

gemini.api-key=test-gemini-key
gemini.grading-api-key=test-gemini-grading-key
